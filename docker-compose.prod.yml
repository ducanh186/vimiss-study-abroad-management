# ==========================================================
# Vimiss — Production Docker Compose (EC2)
# Usage: docker compose -f docker-compose.prod.yml up --build -d
# ==========================================================

services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: vimiss_api
    env_file:
      - .env.production
    volumes:
      - ./docker-data/sqlite:/data/sqlite
      - ./docker-data/storage:/var/www/storage
      - ./docker-data/logs:/var/www/storage/logs
      - ./docker-data/drive/drive-sa.json:/var/www/drive-sa.json:ro
    restart: always
    healthcheck:
      test: ["CMD", "php", "-r", "echo @file_get_contents('http://127.0.0.1:8000/api/health') ? 'ok' : 'fail';"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: vimiss_web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    restart: always
