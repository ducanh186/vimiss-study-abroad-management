# ==========================================================
# Vimiss — Nginx reverse-proxy + static file server
# Static assets: phục vụ trực tiếp từ /usr/share/nginx/html
# Dynamic routes: proxy tới Laravel API container (api:8000)
# ==========================================================

# ── Upstream: Laravel API container ─────────────────────────
upstream laravel {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # ── Proxy protocol — HTTP/1.1 for proper cookie/header handling
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # ── Gzip compression — giảm bandwidth đáng kể ──────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Security headers ────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static assets (Vite build) — cache lâu vì có hash ──
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Static images & landing assets ──────────────────────
    location /images/ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location /landing-assets/ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── Laravel API routes (/api/*) ─────────────────────────
    location /api/ {
        proxy_pass         http://laravel;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
    }

    # ── Sanctum CSRF cookie endpoint ────────────────────────
    location /sanctum/ {
        proxy_pass         http://laravel;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
    }

    # ── Auth web routes (Sanctum SPA cookie auth) ───────────
    location = /login {
        proxy_pass         http://laravel;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
    }

    location = /logout {
        proxy_pass         http://laravel;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
    }

    location /register {
        proxy_pass         http://laravel;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
    }

    location /forgot-password {
        proxy_pass         http://laravel;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
    }

    # ── Mọi route khác → proxy tới Laravel ────────────────
    # Laravel render landing.blade.php (/) hoặc spa.blade.php (SPA)
    location / {
        try_files $uri @laravel;
    }

    location @laravel {
        proxy_pass         http://laravel;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
    }
}
